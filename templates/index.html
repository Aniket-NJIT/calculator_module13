<!DOCTYPE html>
<html>
<head><title>Calculator API</title></head>
<body>
    <nav>
        <a href="/">Calculator</a> | 
        <a href="/login" id="navLogin">Login</a> | 
        <a href="/register" id="navRegister">Register</a> | 
        <button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
    </nav>

    <h2>Calculator</h2>
    <div id="calculator-section" style="display:none;">
        <input type="number" id="numA" placeholder="Number A">
        <select id="operation">
            <option value="Add">Add</option>
            <option value="Sub">Subtract</option>
            <option value="Multiply">Multiply</option>
            <option value="Divide">Divide</option>
        </select>
        <input type="number" id="numB" placeholder="Number B">
        <button onclick="calculate()">Calculate</button>
        <h3 id="resultText"></h3>

        <h3>Your Calculation History</h3>
        <ul id="historyList"></ul>
    </div>
    <h3 id="loginWarning" style="color:red;">You must be logged in to use the calculator.</h3>

    <script>
        const token = localStorage.getItem('token');
        
        if (token) {
            document.getElementById('calculator-section').style.display = 'block';
            document.getElementById('loginWarning').style.display = 'none';
            document.getElementById('navLogin').style.display = 'none';
            document.getElementById('navRegister').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline';
            loadHistory();
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.reload();
        }

        async function fetchWithAuth(url, options = {}) {
            options.headers = {
                ...options.headers,
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            };
            const response = await fetch(url, options);
            if (response.status === 401) logout(); // Token expired
            return response;
        }

        async function calculate() {
            const a = parseFloat(document.getElementById('numA').value);
            const b = parseFloat(document.getElementById('numB').value);
            const type = document.getElementById('operation').value;

            const res = await fetchWithAuth('/calculations', {
                method: 'POST',
                body: JSON.stringify({ a, b, type, user_id: 0 }) // user_id is ignored by backend now
            });
            const data = await res.json();
            document.getElementById('resultText').innerText = `Result: ${data.result}`;
            loadHistory(); // Refresh history
        }

        async function loadHistory() {
            const res = await fetchWithAuth('/calculations');
            const history = await res.json();
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            
            history.forEach(calc => {
                const li = document.createElement('li');
                li.innerHTML = `${calc.a} ${calc.type} ${calc.b} = ${calc.result} 
                    <button onclick="deleteCalc(${calc.id})">Delete</button>`;
                list.appendChild(li);
            });
        }

        async function deleteCalc(id) {
            await fetchWithAuth(`/calculations/${id}`, { method: 'DELETE' });
            loadHistory();
        }
    </script>
</body>
</html>
